# Pyrce game-server Fleet — Agones provisions a pool of these and the
# Pyrce Nakama matchmaker calls the Allocator API to claim one when a
# match is found. Per-pod resource budgets target a 22-player room.
apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: pyrce
  namespace: pyrce
spec:
  replicas: 2
  template:
    metadata:
      labels:
        game: pyrce
    spec:
      ports:
        - name: game
          portPolicy: Dynamic
          containerPort: 7777
          protocol: TCP
      health:
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 3
      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358
      template:
        spec:
          containers:
            - name: pyrce-game-server
              image: ghcr.io/kanya-approve/pyrce-game-server:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: GAME_PORT
                  value: '7777'
                - name: HEALTH_INTERVAL_MS
                  value: '2000'
                - name: ROUND_TIMEOUT_S
                  value: '1800'
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
