services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nakama -d nakama']
      interval: 5s
      timeout: 3s
      retries: 10

  nakama:
    image: ${PYRCE_SERVER_IMAGE:-pyrce-server:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - '/bin/sh'
      - '-ecx'
      - >
        /nakama/nakama migrate up
        --database.address postgres://nakama:${POSTGRES_PASSWORD}@postgres:5432/nakama &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address postgres://nakama:${POSTGRES_PASSWORD}@postgres:5432/nakama
        --session.encryption_key ${SESSION_ENCRYPTION_KEY:?set SESSION_ENCRYPTION_KEY}
        --session.refresh_encryption_key ${SESSION_REFRESH_KEY:?set SESSION_REFRESH_KEY}
        --console.password ${CONSOLE_PASSWORD:?set CONSOLE_PASSWORD}
        --runtime.http_key ${RUNTIME_HTTP_KEY:?set RUNTIME_HTTP_KEY}
    ports:
      - '7350:7350'
    healthcheck:
      test: ['CMD', '/nakama/nakama', 'healthcheck']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
