# Nakama local-dev config.
# Production config lives in infra/helm/pyrce/values.prod.yaml.
name: pyrce-local
data_dir: /nakama/data

logger:
  stdout: true
  level: INFO
  format: JSON

session:
  encryption_key: 'dev-encryption-key-replace-in-prod-32-bytes-min'
  token_expiry_sec: 86400         # 1 day
  refresh_token_expiry_sec: 604800 # 7 days
  refresh_encryption_key: 'dev-refresh-key-replace-in-prod-32-bytes'

socket:
  server_key: 'defaultkey'
  port: 7350
  protocol: tcp

runtime:
  path: /nakama/data/modules
  js_entrypoint: index.js
  http_key: 'defaultkey'

console:
  port: 7351
  username: admin
  password: localdev

metrics:
  prometheus_port: 9100
