controllers:
  web:
    type: deployment
    replicas: 2
    containers:
      web:
        image:
          repository: ghcr.io/kanya-approve/pyrce-client
          tag: latest
          pullPolicy: IfNotPresent
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /, port: 8080 }
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet: { path: /, port: 8080 }
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 250m, memory: 128Mi }

service:
  web:
    controller: web
    ports:
      http:
        port: 8080

ingress:
  web:
    enabled: true
    className: nginx
    hosts:
      - host: pyrcehigh.example.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: web
              port: http
    tls:
      - hosts: [pyrcehigh.example.com]
        secretName: pyrce-client-tls
