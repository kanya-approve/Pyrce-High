{{- /*
  Auto-generated Nakama secrets. Generated once on `helm install`,
  preserved verbatim on every subsequent `helm upgrade` via the lookup
  trick — Helm reads the existing Secret out of the cluster and
  re-emits the same values, so the keys never rotate unintentionally.
  To force a rotation: kubectl delete secret pyrce-nakama-secrets, then
  helm upgrade.
*/ -}}
{{- $name := "pyrce-nakama-secrets" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $sessionKey := "" -}}
{{- $refreshKey := "" -}}
{{- $httpKey := "" -}}
{{- $consolePassword := "" -}}
{{- if $existing }}
  {{- $sessionKey = index $existing.data "session_encryption_key" | b64dec -}}
  {{- $refreshKey = index $existing.data "session_refresh_encryption_key" | b64dec -}}
  {{- $httpKey = index $existing.data "runtime_http_key" | b64dec -}}
  {{- $consolePassword = index $existing.data "console_password" | b64dec -}}
{{- else -}}
  {{- $sessionKey = randAlphaNum 32 -}}
  {{- $refreshKey = randAlphaNum 32 -}}
  {{- $httpKey = randAlphaNum 32 -}}
  {{- $consolePassword = randAlphaNum 24 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  session_encryption_key: {{ $sessionKey | quote }}
  session_refresh_encryption_key: {{ $refreshKey | quote }}
  runtime_http_key: {{ $httpKey | quote }}
  console_password: {{ $consolePassword | quote }}
