controllers:
  nakama:
    type: deployment
    # `replicas` is intentionally NOT configurable here. Nakama is pinned
    # to a single replica because match state is in-memory on the pod
    # that owns each match. The chart hard-fails at template time if
    # an override is attempted (see templates/common.yaml). The bjw-s
    # common library defaults replicas to 1, which is what we want.
    strategy: RollingUpdate
    containers:
      nakama:
        image:
          repository: ghcr.io/kanya-approve/pyrce-nakama
          tag: latest
          pullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -ecx
          - >-
            DB_ADDR="${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}";
            /nakama/nakama migrate up --database.address=$DB_ADDR
            && /nakama/nakama --config /nakama/data/local.yml
            --database.address=$DB_ADDR
            --runtime.path=/nakama/data/modules
            --runtime.js_entrypoint=index.js
            --session.encryption_key=$SESSION_ENCRYPTION_KEY
            --session.refresh_encryption_key=$SESSION_REFRESH_ENCRYPTION_KEY
            --runtime.http_key=$RUNTIME_HTTP_KEY
            --console.password=$CONSOLE_PASSWORD
        env:
          PG_HOST:
            valueFrom:
              secretKeyRef:
                name: pyrce-pg-app
                key: host
          PG_PORT:
            valueFrom:
              secretKeyRef:
                name: pyrce-pg-app
                key: port
          PG_USER:
            valueFrom:
              secretKeyRef:
                name: pyrce-pg-app
                key: username
          PG_PASS:
            valueFrom:
              secretKeyRef:
                name: pyrce-pg-app
                key: password
          PG_DB:
            valueFrom:
              secretKeyRef:
                name: pyrce-pg-app
                key: dbname
          SESSION_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: pyrce-nakama-secrets
                key: session_encryption_key
          SESSION_REFRESH_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: pyrce-nakama-secrets
                key: session_refresh_encryption_key
          RUNTIME_HTTP_KEY:
            valueFrom:
              secretKeyRef:
                name: pyrce-nakama-secrets
                key: runtime_http_key
          CONSOLE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: pyrce-nakama-secrets
                key: console_password
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 7350
              initialDelaySeconds: 10
              periodSeconds: 10
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 7350
              periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

service:
  nakama:
    controller: nakama
    ports:
      api:
        port: 7350
        protocol: HTTP
      rt:
        port: 7349
        protocol: TCP
      console:
        port: 7351
        protocol: HTTP

ingress:
  nakama:
    enabled: true
    className: nginx
    annotations:
      # WebSockets are long-lived; default ingress proxy timeouts (60s) will
      # close idle connections. Bump to 1h. Annotation key is NGINX-specific
      # but harmless under controllers that ignore it.
      nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    hosts:
      - host: play.pyrcehigh.example.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: nakama
              port: api
    tls:
      - hosts: [play.pyrcehigh.example.com]
        secretName: pyrce-nakama-tls

defaultPodOptions:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: pyrce-nakama

postgres:
  enabled: true
  name: pyrce-pg
  database: nakama
  owner: nakama
  # Single instance is enough for a dev/small-prod deployment. For HA in
  # prod, bump to 3 — CNPG handles synchronous replication and failover
  # automatically when instances >= 2. (Also worth bumping resources.)
  instances: 1
  storage:
    size: 20Gi
    # storageClass: leave empty to use the cluster default; override per-env
    storageClass: ''
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  monitoring:
    enablePodMonitor: false

# Nakama session/runtime/console Secret. By default the chart auto-
# generates `pyrce-nakama-secrets` on first install and preserves its
# values across upgrades via the `lookup` trick.
#
# To bring your own (e.g. managed via External-Secrets / sealed-secrets /
# Vault) set `nakamaSecret.create: false`. The chart then skips rendering
# the Secret entirely, but the rest of the chart still expects to find a
# Secret named EXACTLY `pyrce-nakama-secrets` in the release namespace
# with these four keys present:
#   session_encryption_key, session_refresh_encryption_key,
#   runtime_http_key, console_password
# Apply your own Secret BEFORE installing the chart, or the Nakama pod
# will fail to start.
#
# (Key is named `nakamaSecret` rather than `secrets` to avoid colliding
# with the bjw-s common library's own `secrets:` schema.)
nakamaSecret:
  create: true
