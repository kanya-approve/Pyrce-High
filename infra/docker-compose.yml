services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: pyrce-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nakama -d nakama']
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - '5432:5432'

  nakama:
    image: docker.io/heroiclabs/nakama:3.27.0
    container_name: pyrce-nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - '/bin/sh'
      - '-ecx'
      - >
        /nakama/nakama migrate up
        --database.address postgres://nakama:localdev@postgres:5432/nakama &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address postgres://nakama:localdev@postgres:5432/nakama
    volumes:
      - ./nakama/local.yml:/nakama/data/local.yml:ro
      - ../packages/server/dist:/nakama/data/modules:ro
    ports:
      - '7349:7349'   # gRPC
      - '7350:7350'   # HTTP API + WebSocket
      - '7351:7351'   # Console (admin UI)
    healthcheck:
      test: ['CMD', '/nakama/nakama', 'healthcheck']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
