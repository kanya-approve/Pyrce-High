name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Build shared
        run: pnpm -F @pyrce/shared build

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Build server bundle
        run: pnpm -F @pyrce/server build

      - name: Build client
        run: pnpm -F @pyrce/client build

      - name: Verify server bundle is single file
        run: |
          test -f packages/server/dist/index.js
          ls -la packages/server/dist/

      # - name: Upload server bundle artifact
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: server-bundle
      #     path: packages/server/dist/index.js
      #     retention-days: 7

  helm:
    name: helm lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: Add bjw-s repo
        run: helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts
      - name: Lint pyrce-nakama
        run: |
          helm dependency update infra/helm/pyrce-nakama
          helm lint infra/helm/pyrce-nakama
          helm template pyrce-nakama infra/helm/pyrce-nakama > /dev/null
